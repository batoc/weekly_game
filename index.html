<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Quest del Equipo - Gamificación Semanal</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div class="login-logo">🏰</div>
            <h1 class="login-title">Quest del Equipo</h1>
            <p class="login-subtitle">¡Planifica, conquista y diviértete!</p>
            <div class="login-form">
                <div id="github-status-bar" class="github-status-bar"></div>
                <label>Contraseña del equipo:</label>
                <input type="password" id="login-password" placeholder="Ingresa la contraseña">
                <label>Selecciona tu personaje:</label>
                <select id="login-player-select">
                    <option value="">-- Elige tu héroe --</option>
                </select>
                <button id="btn-login" class="btn btn-primary btn-lg" onclick="App.login()">⚔️ Entrar al Juego</button>
                <button class="btn btn-ghost btn-sm" onclick="App.showGitHubSetup()">🔗 Conectar con GitHub</button>
                <button class="btn btn-secondary btn-sm" onclick="App.showScreen('config')">⚙️ Configuración</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-container" class="hidden">
        <!-- SIDEBAR NAV -->
        <nav id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo">🏰</span>
                <span class="sidebar-title">Quest</span>
            </div>
            <div class="nav-items">
                <button class="nav-btn active" data-screen="dashboard" onclick="App.showScreen('dashboard')">
                    <span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span>
                </button>
                <button class="nav-btn" data-screen="misiones" onclick="App.showScreen('misiones')">
                    <span class="nav-icon">🎯</span><span class="nav-label">Misiones</span>
                </button>
                <button class="nav-btn" data-screen="verificar" onclick="App.showScreen('verificar')">
                    <span class="nav-icon">✅</span><span class="nav-label">Verificar</span>
                </button>
                <button class="nav-btn" data-screen="poderes" onclick="App.showScreen('poderes')">
                    <span class="nav-icon">⚡</span><span class="nav-label">Poderes</span>
                </button>
                <button class="nav-btn" data-screen="votos" onclick="App.showScreen('votos')">
                    <span class="nav-icon">🗳️</span><span class="nav-label">Votos</span>
                </button>
                <button class="nav-btn" data-screen="rankings" onclick="App.showScreen('rankings')">
                    <span class="nav-icon">🏆</span><span class="nav-label">Rankings</span>
                </button>
                <button class="nav-btn" data-screen="proyectos" onclick="App.showScreen('proyectos')">
                    <span class="nav-icon">📊</span><span class="nav-label">Proyectos</span>
                </button>
                <button class="nav-btn" data-screen="perfil" onclick="App.showScreen('perfil')">
                    <span class="nav-icon">👤</span><span class="nav-label">Perfil</span>
                </button>
                <button class="nav-btn" data-screen="config" onclick="App.showScreen('config')">
                    <span class="nav-icon">⚙️</span><span class="nav-label">Config</span>
                </button>
            </div>
            <div class="sidebar-footer">
                <div id="sidebar-player-info"></div>
                <button class="btn btn-sm btn-danger" onclick="App.logout()">🚪 Salir</button>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <main id="main-content">
            <div id="screen-dashboard" class="screen-content"></div>
            <div id="screen-misiones" class="screen-content hidden"></div>
            <div id="screen-verificar" class="screen-content hidden"></div>
            <div id="screen-poderes" class="screen-content hidden"></div>
            <div id="screen-votos" class="screen-content hidden"></div>
            <div id="screen-rankings" class="screen-content hidden"></div>
            <div id="screen-proyectos" class="screen-content hidden"></div>
            <div id="screen-perfil" class="screen-content hidden"></div>
            <div id="screen-config" class="screen-content hidden"></div>
        </main>
    </div>

    <!-- CONFETTI CANVAS -->
    <canvas id="confetti-canvas"></canvas>

    <!-- MODAL -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-content" class="modal-content"></div>
    </div>

    <!-- TOAST -->
    <div id="toast-container"></div>

    <script src="js/github-api.js"></script>
    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
